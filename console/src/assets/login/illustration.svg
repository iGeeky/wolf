<svg xmlns="http://www.w3.org/2000/svg" width="500" height="380" viewBox="0 0 500 380">
  <defs>
    <!-- 主渐变：蓝绿 -->
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00f7a1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
    </linearGradient>
    
    <!-- 内容渐变：绿青色 -->
    <linearGradient id="contentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f7a1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
    </linearGradient>
    
    <!-- 亚克力背景渐变 -->
    <linearGradient id="acrylicBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:0.5" />
      <stop offset="50%" style="stop-color:#0d2137;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#0a2520;stop-opacity:0.5" />
    </linearGradient>
    
    <!-- 边框霓虹渐变：蓝绿 -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00f7a1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
    </linearGradient>
    
    <!-- 霓虹发光效果 -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 柔和发光 -->
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- 玻璃高光 -->
    <linearGradient id="glassHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
  </defs>
  
  <!-- 主卡片：亚克力无边框效果 -->
  <rect x="15" y="15" width="470" height="350" rx="24" fill="url(#acrylicBg)"/>
  
  <!-- 霓虹边框发光层 -->
  <rect x="15" y="15" width="470" height="350" rx="24" fill="none" 
        stroke="url(#borderGrad)" stroke-width="2" filter="url(#neonGlow)" opacity="0.8"/>
  
  <!-- 玻璃高光层 -->
  <rect x="15" y="15" width="470" height="175" rx="24" fill="url(#glassHighlight)"/>
  
  <!-- 内部发光边缘 -->
  <rect x="20" y="20" width="460" height="340" rx="20" fill="none" 
        stroke="url(#borderGrad)" stroke-width="0.5" opacity="0.4"/>
  
  <!-- 网格背景 - 全息效果 -->
  <g opacity="0.08">
    <line x1="60" y1="15" x2="60" y2="365" stroke="url(#neonGrad)" stroke-width="0.5"/>
    <line x1="140" y1="15" x2="140" y2="365" stroke="url(#neonGrad)" stroke-width="0.5"/>
    <line x1="220" y1="15" x2="220" y2="365" stroke="url(#neonGrad)" stroke-width="0.5"/>
    <line x1="300" y1="15" x2="300" y2="365" stroke="url(#neonGrad)" stroke-width="0.5"/>
    <line x1="380" y1="15" x2="380" y2="365" stroke="url(#neonGrad)" stroke-width="0.5"/>
    <line x1="15" y1="80" x2="485" y2="80" stroke="url(#neonGrad)" stroke-width="0.5"/>
    <line x1="15" y1="160" x2="485" y2="160" stroke="url(#neonGrad)" stroke-width="0.5"/>
    <line x1="15" y1="240" x2="485" y2="240" stroke="url(#neonGrad)" stroke-width="0.5"/>
    <line x1="15" y1="320" x2="485" y2="320" stroke="url(#neonGrad)" stroke-width="0.5"/>
  </g>

  <!-- 连接线 - 霓虹效果 -->
  <g stroke="url(#contentGrad)" stroke-width="2" fill="none" opacity="0.7" filter="url(#softGlow)">
    <path d="M 100 140 Q 150 170 200 170" stroke-dasharray="5,3"/>
    <path d="M 100 190 Q 150 190 200 190"/>
    <path d="M 100 240 Q 150 210 200 210" stroke-dasharray="5,3"/>
    <path d="M 280 170 Q 320 190 360 180"/>
    <path d="M 280 210 Q 320 200 360 210"/>
    <path d="M 280 190 Q 320 220 360 240" stroke-dasharray="5,3"/>
  </g>

  <!-- USERS 区域 - 玻璃卡片 -->
  <g transform="translate(50, 130)">
    <rect x="0" y="0" width="80" height="120" rx="12" fill="rgba(10,22,40,0.6)"/>
    <rect x="0" y="0" width="80" height="120" rx="12" fill="none" stroke="url(#borderGrad)" stroke-width="1" filter="url(#softGlow)"/>
    <rect x="0" y="0" width="80" height="60" rx="12" fill="url(#glassHighlight)"/>
    <text x="40" y="-10" fill="url(#contentGrad)" font-size="11" font-family="Arial, sans-serif" text-anchor="middle" font-weight="bold" filter="url(#softGlow)">USERS</text>
    <!-- User icons -->
    <g transform="translate(40, 25)">
      <circle cx="0" cy="0" r="10" fill="url(#contentGrad)" opacity="0.9"/>
      <circle cx="0" cy="-4" r="4" fill="#0a0a1a"/>
      <path d="M-6 5 Q0 10 6 5" stroke="#0a0a1a" stroke-width="2" fill="none"/>
    </g>
    <g transform="translate(40, 60)">
      <circle cx="0" cy="0" r="10" fill="url(#contentGrad)" opacity="0.7"/>
      <circle cx="0" cy="-4" r="4" fill="#0a0a1a"/>
      <path d="M-6 5 Q0 10 6 5" stroke="#0a0a1a" stroke-width="2" fill="none"/>
    </g>
    <g transform="translate(40, 95)">
      <circle cx="0" cy="0" r="10" fill="url(#contentGrad)" opacity="0.5"/>
      <circle cx="0" cy="-4" r="4" fill="#0a0a1a"/>
      <path d="M-6 5 Q0 10 6 5" stroke="#0a0a1a" stroke-width="2" fill="none"/>
    </g>
  </g>

  <!-- ROLES 区域 - 玻璃卡片 -->
  <g transform="translate(200, 145)">
    <rect x="0" y="0" width="80" height="90" rx="12" fill="rgba(10,22,40,0.6)"/>
    <rect x="0" y="0" width="80" height="90" rx="12" fill="none" stroke="url(#borderGrad)" stroke-width="1" filter="url(#softGlow)"/>
    <rect x="0" y="0" width="80" height="45" rx="12" fill="url(#glassHighlight)"/>
    <text x="40" y="-10" fill="url(#neonGrad)" font-size="11" font-family="Arial, sans-serif" text-anchor="middle" font-weight="bold" filter="url(#softGlow)">ROLES</text>
    <!-- Role badges -->
    <g transform="translate(40, 25)">
      <polygon points="0,-12 10,-4 6,10 -6,10 -10,-4" fill="url(#contentGrad)" opacity="0.9"/>
      <text x="0" y="3" fill="#0a0a1a" font-size="8" font-family="Arial" text-anchor="middle" font-weight="bold">A</text>
    </g>
    <g transform="translate(40, 55)">
      <polygon points="0,-10 8,-3 5,8 -5,8 -8,-3" fill="url(#contentGrad)" opacity="0.7"/>
      <text x="0" y="2" fill="#0a0a1a" font-size="7" font-family="Arial" text-anchor="middle" font-weight="bold">M</text>
    </g>
    <g transform="translate(40, 80)">
      <polygon points="0,-8 7,-2 4,7 -4,7 -7,-2" fill="url(#contentGrad)" opacity="0.5"/>
      <text x="0" y="2" fill="#0a0a1a" font-size="6" font-family="Arial" text-anchor="middle" font-weight="bold">U</text>
    </g>
  </g>

  <!-- PERMISSIONS 区域 - 玻璃卡片 -->
  <g transform="translate(360, 145)">
    <rect x="0" y="0" width="90" height="110" rx="12" fill="rgba(10,22,40,0.6)"/>
    <rect x="0" y="0" width="90" height="110" rx="12" fill="none" stroke="url(#borderGrad)" stroke-width="1" filter="url(#softGlow)"/>
    <rect x="0" y="0" width="90" height="55" rx="12" fill="url(#glassHighlight)"/>
    <text x="45" y="-10" fill="url(#contentGrad)" font-size="10" font-family="Arial, sans-serif" text-anchor="middle" font-weight="bold" filter="url(#softGlow)">PERMISSIONS</text>
    <!-- Permission items -->
    <g transform="translate(20, 25)">
      <rect x="0" y="-8" width="50" height="16" rx="4" fill="url(#contentGrad)" opacity="0.9"/>
      <text x="25" y="3" fill="#0a0a1a" font-size="8" font-family="Arial" text-anchor="middle" font-weight="bold">READ</text>
    </g>
    <g transform="translate(20, 50)">
      <rect x="0" y="-8" width="50" height="16" rx="4" fill="url(#contentGrad)" opacity="0.7"/>
      <text x="25" y="3" fill="#0a0a1a" font-size="8" font-family="Arial" text-anchor="middle" font-weight="bold">WRITE</text>
    </g>
    <g transform="translate(20, 75)">
      <rect x="0" y="-8" width="50" height="16" rx="4" fill="url(#contentGrad)" opacity="0.5"/>
      <text x="25" y="3" fill="#0a0a1a" font-size="8" font-family="Arial" text-anchor="middle" font-weight="bold">DELETE</text>
    </g>
    <g transform="translate(20, 100)">
      <rect x="0" y="-8" width="50" height="16" rx="4" fill="url(#contentGrad)" opacity="0.3"/>
      <text x="25" y="3" fill="#0a0a1a" font-size="8" font-family="Arial" text-anchor="middle" font-weight="bold">ADMIN</text>
    </g>
  </g>

  <!-- 中央盾牌图标 - 霓虹发光 -->
  <g transform="translate(250, 310)" filter="url(#neonGlow)">
    <path d="M0,-30 L25,-20 L25,10 Q25,30 0,40 Q-25,30 -25,10 L-25,-20 Z" 
          fill="url(#contentGrad)" opacity="0.9" stroke="url(#borderGrad)" stroke-width="1.5"/>
    <circle cx="0" cy="2" r="8" fill="rgba(10,10,26,0.8)"/>
    <rect x="-2" y="2" width="4" height="12" rx="1" fill="rgba(10,10,26,0.8)"/>
  </g>

  <!-- 顶部标题 - 霓虹效果 -->
  <text x="250" y="58" fill="url(#neonGrad)" font-size="28" font-family="Arial, sans-serif" text-anchor="middle" font-weight="bold" filter="url(#neonGlow)">WOLF RBAC</text>
  <text x="250" y="80" fill="url(#borderGrad)" font-size="12" font-family="Arial, sans-serif" text-anchor="middle" opacity="0.9" filter="url(#softGlow)">Role-Based Access Control System</text>

  <!-- 装饰性霓虹光点：蓝绿色系 -->
  <circle cx="35" cy="35" r="4" fill="#00d4ff" opacity="0.9" filter="url(#neonGlow)"/>
  <circle cx="465" cy="35" r="4" fill="#00f7a1" opacity="0.9" filter="url(#neonGlow)"/>
  <circle cx="35" cy="345" r="4" fill="#00e5b8" opacity="0.7" filter="url(#neonGlow)"/>
  <circle cx="465" cy="345" r="4" fill="#00c8e0" opacity="0.7" filter="url(#neonGlow)"/>
  
  <!-- 额外的全息装饰线 -->
  <path d="M35 100 Q50 95 65 100" stroke="url(#borderGrad)" stroke-width="1" fill="none" opacity="0.5" filter="url(#softGlow)"/>
  <path d="M435 100 Q450 95 465 100" stroke="url(#borderGrad)" stroke-width="1" fill="none" opacity="0.5" filter="url(#softGlow)"/>
  <path d="M35 280 Q50 285 65 280" stroke="url(#borderGrad)" stroke-width="1" fill="none" opacity="0.5" filter="url(#softGlow)"/>
  <path d="M435 280 Q450 285 465 280" stroke="url(#borderGrad)" stroke-width="1" fill="none" opacity="0.5" filter="url(#softGlow)"/>
</svg>
